---
layout: default
---
<article class="post wrap" style="max-width: 800px;">
  <p class="meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.author %} · {{ page.author }}{% endif %}</p>
  <h1>{{ page.title }}</h1>
  {{ content }}
  <hr>
  <p><a href="{{ '/blog/' | relative_url }}">← Back to the blog</a></p>
</article>
