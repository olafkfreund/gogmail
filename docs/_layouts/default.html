<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}"><span class="tilde">~</span>/gogmail</a>
      <nav class="nav">
        <a href="{{ '/#features' | relative_url }}">Features</a>
        <a href="{{ '/#why' | relative_url }}">Why</a>
        <a href="{{ '/#screenshots' | relative_url }}">Screenshots</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="{{ site.repo_url }}">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>GogMail TUI · MIT licensed · <a href="{{ site.repo_url }}">{{ site.repo_url | remove: "https://" }}</a></p>
      <p class="mono">✨ Created using Claude Code</p>
    </div>
  </footer>
</body>
</html>
